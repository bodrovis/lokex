name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        cache: false
        
    - name: Run tests
      run: go test -count=1 -coverpkg=./... -coverprofile=coverage.out ./... -v -short
    
    - name: Debug coverage path mapping
      run: |
        sed -n '1,10p' coverage.out
        test -f client/client.go && echo "found client/client.go"
        test -f v2/client/client.go && echo "found v2/client/client.go"

    - uses: qltysh/qlty-action/coverage@v2
      with:
        token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
        files: coverage.out
        strip-prefix: github.com/bodrovis/lokex/v2/